services:
  - type: web
    name: nse-stock-forecasting
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
    healthCheckPath: /_stcore/health
    autoDeploy: true
